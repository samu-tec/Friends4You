<VirtualHost *:80>
    ServerName friends4you.samuelciocan.com

    # La raiz del sitio es la carpeta public/, asi el resto del codigo
    # (app/, database/) queda fuera de la web y no se puede abrir por URL.
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride None
        Require all granted
    </Directory>
</VirtualHost>
